spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ushirika_dev
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: update   # auto-update schema in dev; use validate in prod
    show-sql: true

logging:
  level:
    com.mdau.ushirika: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

app:
  jwt:
    secret: dev-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
    access-token-expiry-ms: 3600000    # 1 hour in dev (easier to test)
    refresh-token-expiry-ms: 604800000

  superadmin:
    email: admin@ushirikawelfare.org
    password: Admin@1234
    phone: "+254000000000"

  brevo:
    api-key: NOT_SET                   # logs email to console in dev
    sender-email: noreply@ushirikawelfare.org
    sender-name: Ushirika Welfare
