spring:
  datasource:
    # Railway provides a single DATABASE_URL — append sslmode so the driver accepts it.
    url: ${DATABASE_URL}?sslmode=require
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      keepalive-time: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    com.mdau.ushirika: INFO
    org.springframework.security: WARN

app:
  cors:
    allowed-origins:
      - ${FRONTEND_URL}
