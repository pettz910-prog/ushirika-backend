spring:
  application:
    name: ushirika-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ushirika_db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      leak-detection-threshold: 60000
      pool-name: UshirikaHikariPool
      connection-test-query: SELECT 1

  mail:
    host: smtp-relay.brevo.com
    port: 2525
    username: ${BREVO_SMTP_USERNAME:lezisign@gmail.com}
    password: ${BREVO_SMTP_PASSWORD:NOT_SET}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    open-in-view: false
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        use_sql_comments: false
        generate_statistics: false
        hbm2ddl:
          halt_on_error: false
        jdbc:
          time_zone: UTC
          batch_size: 20
        order_inserts: true
        order_updates: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
    deserialization:
      fail-on-unknown-properties: false
    mapper:
      accept-case-insensitive-enums: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024
  http2:
    enabled: true
  shutdown: graceful
  error:
    include-stacktrace: never
    include-exception: false
    include-message: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
  health:
    mail:
      enabled: false

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5176,http://localhost:5173,http://localhost:5174}

  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY:900000}       # 15 minutes
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY:604800000}  # 7 days

  # Brevo (email)
  brevo:
    api-key: ${BREVO_API_KEY:NOT_SET}
    sender-email: ${BREVO_SENDER_EMAIL:noreply@ushirikawelfare.org}
    sender-name: ${BREVO_SENDER_NAME:Ushirika Welfare}

  # Africa's Talking (SMS)
  africas-talking:
    api-key: ${AT_API_KEY:NOT_SET}
    username: ${AT_USERNAME:NOT_SET}
    sender-id: ${AT_SENDER_ID:USHIRIKA}

  # Cloudinary (media)
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:NOT_SET}
    api-key: ${CLOUDINARY_API_KEY:NOT_SET}
    api-secret: ${CLOUDINARY_API_SECRET:NOT_SET}

  # Stripe (card payments)
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:NOT_SET}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:NOT_SET}

  # Superadmin seed credentials (first boot only)
  superadmin:
    email: ${SUPERADMIN_EMAIL}
    password: ${SUPERADMIN_PASSWORD}
    phone: ${SUPERADMIN_PHONE}

  # Approval quorum per application type
  approval:
    welfare-threshold: all
    scholarship-threshold: all
    membership-threshold: all

  # Rate limiting (requests per minute per IP)
  rate-limit:
    auth-rpm: ${RATE_LIMIT_AUTH_RPM:10}
    public-rpm: ${RATE_LIMIT_PUBLIC_RPM:60}
    api-rpm: ${RATE_LIMIT_API_RPM:120}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:true}
    operations-sorter: method
  api-docs:
    path: /v3/api-docs
    enabled: ${SWAGGER_ENABLED:true}

logging:
  level:
    root: WARN
    com.mdau.ushirika: ${LOG_LEVEL:INFO}
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
